<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulacro ICFES</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
window.MathJax = {
tex: {
inlineMath: [['$', '$']]
}
};
</script>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>


<link rel="stylesheet" href="style.css">

</head>


<body>
    <!-- 🔐 LOGIN / REGISTRO -->
<div id="auth">

    <div id="auth-box">

        <h2>Simulacro ICFES</h2>

        <input type="text" id="nombre" placeholder="Nombre de usuario">
        <input type="email" id="correo" placeholder="Correo">
        <input type="password" id="password" placeholder="Contraseña">

        <button onclick="login()">Iniciar sesión</button>
        <button onclick="registro()">Registrarse</button>

        <p id="auth-msg"></p>

    </div>

</div>
 <!-- SIDEBAR -->
    <div id="sidebar">
        <button onclick="mostrarModulo('inicio')">Inicio</button>
        <button onclick="mostrarModulo('simulacro')">Simulacro</button>
        <button onclick="mostrarModulo('ranking')">Ranking</button>
        <button onclick="mostrarModulo('historial')">Historial</button>
        <button onclick="mostrarModulo('perfil')">Perfil</button>
         <button onclick="mostrarModulo('administracion')">administracion</button>
    </div>
<div id="app">

<h2>Simulacro ICFES</h2>

<div id="layout">
    <div id="contenido">

        <!-- INICIO -->
        <div id="mod-inicio" class="modulo">
            <h3>Bienvenido 👋</h3>
            <p>Prepárate para el ICFES y mejora tus resultados.</p>
            <p>La práctica constante es la clave del éxito 💪</p>
        </div>

        <!-- SIMULACRO -->
        <div id="mod-simulacro" class="modulo" style="display:none;">

            <div id="menu">
                <h3>Selecciona el área</h3>

                <button onclick="iniciarSimulacro(1)">Matemáticas</button>
                <button onclick="iniciarSimulacro(2)">Lectura Crítica</button>
                <button onclick="iniciarSimulacro(3)">Sociales</button>
                <button onclick="iniciarSimulacro(4)">Naturales</button>
                <button onclick="iniciarSimulacro(5)">Inglés</button>
            </div>

            <p id="stats"></p>
            <p id="tiempo">Tiempo: 00:00</p>

            <div id="enunciado"></div>
            <div id="opciones"></div>

            <button id="btn" onclick="siguiente()" style="display:none;">
                Siguiente
            </button>

        </div>

        <!-- RANKING -->
        <div id="mod-ranking" class="modulo" style="display:none;">
            <h3>🏆 Ranking</h3>
            <div id="lista-ranking"></div>
        </div>

        <!-- HISTORIAL -->
        <div id="mod-historial" class="modulo" style="display:none;">
            <h3>📊 Historial</h3>
            <div id="lista-historial"></div>
        </div>

        <!-- PERFIL -->
        <div id="mod-perfil" class="modulo" style="display:none;">
            <h3>👤 Perfil</h3>

            <p><strong>Nombre:</strong> <span id="perfil-nombre"></span></p>
            <p><strong>Correo:</strong> <span id="perfil-correo"></span></p>

            <p>Intentos: <span id="perfil-intentos"></span></p>
            <p>Mejor puntaje: <span id="perfil-mejor"></span></p>
        </div>

        <div id="mod-admin" class="modulo" style="display:none;">
    <h3>🛠️ Panel de Administración</h3>

    <!-- TABS -->
    <div class="admin-tabs">
        <button onclick="cambiarTabAdmin('añadir', this)" class="tab-btn active">➕ Añadir</button>
        <button onclick="cambiarTabAdmin('editar', this)" class="tab-btn">✏️ Editar</button>
        <button onclick="cambiarTabAdmin('eliminar', this)" class="tab-btn">🗑️ Eliminar</button>
    </div>

    <!-- ================= AÑADIR ================= -->
    <div id="tab-añadir" class="tab-content">

        <div class="admin-form">

            <select id="adm-area">
                <option value="1">Matemáticas</option>
                <option value="2">Lectura</option>
                <option value="3">Sociales</option>
                <option value="4">Naturales</option>
                <option value="5">Inglés</option>
            </select>

            <input type="number" id="adm-contexto" placeholder="ID Contexto (opcional)">

            <textarea id="adm-enunciado" placeholder="Enunciado"></textarea>

            <input id="adm-a" placeholder="Opción A">
            <input id="adm-b" placeholder="Opción B">
            <input id="adm-c" placeholder="Opción C">
            <input id="adm-d" placeholder="Opción D">

            <select id="adm-correcta">
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
            </select>

            <button onclick="guardarNuevaPregunta()">💾 Guardar</button>

            <p id="admin-msg"></p>
        </div>
    </div>

    <!-- ================= EDITAR ================= -->
    <div id="tab-editar" class="tab-content" style="display:none;">

        <input type="number" id="edit-id-buscar" placeholder="ID pregunta">
        <button onclick="buscarPreguntaParaEditar()">🔍 Buscar</button>

        <div id="contenedor-edicion" style="display:none;">

            <input type="number" id="edit-contexto" placeholder="ID Contexto">

            <textarea id="edit-enunciado"></textarea>

            <input id="edit-a">
            <input id="edit-b">
            <input id="edit-c">
            <input id="edit-d">

            <select id="edit-correcta">
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
            </select>

            <button onclick="actualizarPregunta()">💾 Guardar cambios</button>
        </div>
    </div>

    <!-- ================= ELIMINAR ================= -->
    <div id="tab-eliminar" class="tab-content" style="display:none;">
        <input type="number" id="del-id" placeholder="ID pregunta">
        <button onclick="eliminarPregunta()">🗑️ Eliminar</button>
    </div>

</div>


    </div>

</div>

<script src="app.js"></script>

</body>
</html>
